</div>
<div class="p-5" id="current_link">
  <h4 class="mb-3">
    <a target="_blank" href=
            "https://docs.google.com/forms/d/e/1FAIpQLSevlGCe7tHci44kNfisfBuBsMnSeOg64ACtP_W8zuB5Y-sfKw/viewform"
<!-- {{SURVEYLINKHERE}} -->

      Take part in the latest survey here
    </a>
  </h4>
</div>
<div class="page-content" id="results_list"></div>
<!-- Load Bootstrap JavaScript components -->
<script src="https://code.jquery.com/jquery.min.js"></script>
<script src="https://netdna.bootstrapcdn.com/bootstrap/3.3.2/js/bootstrap.min.js"></script>
<script>
  let games = [
['Chelsea_1_-_1_Liverpool_PL_13-08-2023_CHE', 'https://imgur.com/a/V459cj3'],
['Liverpool_3_-_1_AFC_Bournemouth_PL_19-08-2023_BOU', 'https://imgur.com/a/3EXRgf2'],
['Newcastle_United_1_-_2_Liverpool_PL_27-08-2023_NEW', 'https://imgur.com/a/AumFVHh'],
['Liverpool_3_-_0_Aston_Villa_PL_03-09-2023_AVL', 'https://imgur.com/a/0QFM8jD'],
['Wolves_1_-_3_Liverpool_PL_16-09-2023_WOL', 'https://imgur.com/a/Y1iEPH4'],
['LASK_1_-_3_Liverpool_EL_21-09-2023_LIN', 'https://imgur.com/a/7IEGbVI'],
['Liverpool_3_-_1_West_Ham_United_PL_24-09-2023_WHU', 'https://imgur.com/a/IumeES9'],

// {{GAMELISTHERE}}
  ]
  let competitions = {
    'PL': 'Premier League',
    'CL': 'Champions League',
    'FA': 'FA Cup',
    'LC': 'League Cup',
    'CS': 'Community Shield',
    'SC': 'Super Cup',
    'WC': 'Club World Cup',
    'EL': 'Europa League'
  }
  let months = {
    '01': 'January',
    '02': 'February',
    '03': 'March',
    '04': 'April',
    '05': 'May',
    '06': 'June',
    '07': 'July',
    '08': 'August',
    '09': 'September',
    '10': 'October',
    '11': 'November',
    '12': 'December'
  }
  let home_map = {
    0: 'home',
    1: 'away',
    2: 'third'
  }
  if (games.length === 0) {
    document.getElementById('current_link').innerHTML = '<h1 style="color: white">Next season coming soon!</h1>'
  }
  else {
    let curr_element = ''
    let results_list_element = document.getElementById('results_list')
    let inner_html_to_append = ''
    let home = 2
    for (let game in games) {
      let fixture = games[game][0]
      let link = games[game][1]
      let split_fixture = fixture.split('_')
      let match_result = split_fixture.slice(0, -3).join(' ')
      let competition = competitions[split_fixture[split_fixture.length - 3]]
      let date = split_fixture[split_fixture.length - 2]
      let month_num = date.split('-')[1]
      let month = months[month_num]
      if (!curr_element.includes(month)) {
        inner_html_to_append += curr_element + '</p></div>'
        home += 1
        if (home === 3) {
          home = 0
        }
        curr_element = '<div class="' + home_map[home] + '" id="' + month + '"><h2>' + month + '</h2><p>'
      }
      curr_element += '<a href="' + link + '" target="_blank">&bull; ' + match_result + ' <i>(' + competition + ')</i></a><br>'
    }
    results_list_element.innerHTML = inner_html_to_append + curr_element + '</p></div>'
  }
</script>
</body>
</html>
